<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WeChatSim v5.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ededed;--white:#fff;--green:#07c160;--green2:#95ec69;
  --text:#000;--text2:#666;--text3:#999;--border:#e5e5e5;
  --chat-bg:#ededed;--header:#ededed;--tab-bg:#f7f7f7;
  --bubble-self:#95ec69;--bubble-other:#fff;
  --red:#fa5151;--orange:#ff8800;--blue:#576b95;
  --card-bg:#fff;--input-bg:#f5f5f5;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:15px;color:var(--text);background:#000;overflow:hidden;user-select:none;-webkit-user-select:none}
#app{max-width:430px;margin:0 auto;height:100%;position:relative;overflow:hidden;background:var(--bg)}
.page{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;z-index:1}
.page.hide{display:none}

/* Status Bar */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 16px;font-size:12px;background:var(--header);color:var(--text);height:28px;flex-shrink:0}
.status-bar .left{font-weight:600}
.status-bar .right{display:flex;gap:4px;align-items:center}
.status-bar .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}

/* Navbar */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--header);border-bottom:1px solid var(--border);height:48px;flex-shrink:0}
.navbar .title{font-size:17px;font-weight:600;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navbar .back,.navbar .action{width:60px;display:flex;align-items:center;cursor:pointer;font-size:14px;color:var(--text)}
.navbar .back{justify-content:flex-start}
.navbar .action{justify-content:flex-end;gap:8px}
.navbar .action span{font-size:20px}

/* TabBar */
.tabbar{display:flex;border-top:1px solid var(--border);background:var(--tab-bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;cursor:pointer;position:relative}
.tabbar .tab .icon{font-size:22px}
.tabbar .tab .label{font-size:10px;color:var(--text3);margin-top:2px}
.tabbar .tab.active .label{color:var(--green)}
.tabbar .tab .badge{position:absolute;top:2px;right:50%;margin-right:-18px;background:var(--red);color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* Search */
.search-bar{padding:8px 12px;background:var(--header)}
.search-bar input{width:100%;padding:8px 12px;border:none;border-radius:6px;background:var(--input-bg);font-size:14px;outline:none}

/* List Items */
.list-item{display:flex;align-items:center;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer}
.list-item:active{background:#f0f0f0}
.list-item .avatar{width:44px;height:44px;border-radius:6px;margin-right:12px;flex-shrink:0;object-fit:cover;background:#ddd}
.list-item .info{flex:1;min-width:0}
.list-item .info .name{font-size:16px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .info .msg{font-size:13px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.list-item .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px}
.list-item .meta .time{font-size:11px;color:var(--text3)}
.list-item .arrow{color:var(--text3);margin-left:8px}

/* Section */
.section{margin-top:10px}
.section-title{padding:8px 16px;font-size:13px;color:var(--text3)}
.section-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer}
.section-item:active{background:#f0f0f0}
.section-item .left{display:flex;align-items:center;gap:10px;font-size:15px}
.section-item .right{color:var(--text3);display:flex;align-items:center;gap:6px;font-size:14px}

/* Chat */
.chat-area{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.chat-area::-webkit-scrollbar{display:none}
.msg-row{display:flex;margin-bottom:10px;align-items:flex-start}
.msg-row.self{flex-direction:row-reverse}
.msg-row .m-avatar{width:38px;height:38px;border-radius:6px;flex-shrink:0;cursor:pointer;object-fit:cover}
.msg-row .m-bubble{max-width:65%;margin:0 10px;position:relative}
.msg-row .m-bubble .bubble{padding:10px 14px;border-radius:8px;font-size:15px;line-height:1.5;word-break:break-word;position:relative}
.msg-row:not(.self) .m-bubble .bubble{background:var(--bubble-other);color:var(--text)}
.msg-row.self .m-bubble .bubble{background:var(--bubble-self);color:var(--text)}
.msg-row .m-bubble .sender{font-size:12px;color:var(--text3);margin-bottom:3px}
.msg-time{text-align:center;color:var(--text3);font-size:12px;margin:8px 0}
.msg-system{text-align:center;color:var(--text3);font-size:12px;margin:6px 16px;background:rgba(0,0,0,.05);border-radius:4px;padding:4px 8px}

/* Chat Input */
.chat-input-bar{display:flex;align-items:flex-end;padding:8px 10px;background:var(--header);border-top:1px solid var(--border);flex-shrink:0;gap:6px}
.chat-input-bar textarea{flex:1;border:none;border-radius:6px;padding:8px 10px;font-size:15px;background:var(--white);resize:none;outline:none;max-height:100px;min-height:36px;line-height:1.4}
.chat-input-bar .btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;border-radius:6px}
.chat-input-bar .send-btn{background:var(--green);color:#fff;font-size:14px;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600}

/* Chat extras panel */
.chat-extras{display:none;background:var(--header);border-top:1px solid var(--border);padding:16px;flex-shrink:0}
.chat-extras.show{display:block}
.chat-extras .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.chat-extras .grid .item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.chat-extras .grid .item .icon{width:50px;height:50px;background:var(--white);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.chat-extras .grid .item .label{font-size:11px;color:var(--text2)}

/* Quick buttons */
.quick-btns{display:flex;gap:4px;padding:4px 8px;background:var(--header);flex-shrink:0;overflow-x:auto}
.quick-btns::-webkit-scrollbar{display:none}
.quick-btns .qb{font-size:11px;padding:4px 8px;border-radius:12px;background:var(--green);color:#fff;cursor:pointer;white-space:nowrap;border:none}
.quick-btns .qb:active{opacity:.7}

/* Sticker panel */
.sticker-panel{display:none;background:var(--header);border-top:1px solid var(--border);padding:8px;max-height:200px;overflow-y:auto;flex-shrink:0}
.sticker-panel.show{display:block}
.sticker-panel .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sticker-panel .grid img{width:100%;aspect-ratio:1;object-fit:contain;cursor:pointer;border-radius:6px;background:var(--input-bg)}

/* Multi-select bar */
.select-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--header);border-top:1px solid var(--border);flex-shrink:0}
.select-bar .btn{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:14px}
.msg-row .m-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);margin:8px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.msg-row .m-check.checked{background:var(--green);border-color:var(--green);color:#fff}

/* Red Packet */
.rp-bubble{background:#fa9d3b!important;color:#fff!important;border-radius:10px!important;padding:12px!important;min-width:200px;cursor:pointer}
.rp-bubble .rp-title{font-size:15px;margin-bottom:4px}
.rp-bubble .rp-label{font-size:11px;border-top:1px solid rgba(255,255,255,.3);padding-top:6px;margin-top:8px}
.rp-bubble.opened{opacity:.7}

/* Gift */
.gift-bubble{background:linear-gradient(135deg,#ff6b6b,#ee5a24)!important;color:#fff!important;border-radius:10px!important;padding:12px!important;min-width:180px}

/* Image in chat */
.img-bubble{padding:0!important;background:transparent!important;overflow:hidden;border-radius:8px!important}
.img-bubble img{max-width:200px;max-height:200px;display:block;border-radius:8px;cursor:pointer}

/* Video in chat */
.vid-bubble{position:relative;cursor:pointer;padding:0!important;background:#000!important;border-radius:8px!important;overflow:hidden}
.vid-bubble .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:#fff;text-shadow:0 0 10px rgba(0,0,0,.5)}

/* Location */
.loc-bubble{background:var(--white)!important;border-radius:10px!important;padding:10px!important;min-width:180px}
.loc-bubble .loc-icon{font-size:24px}

/* Narrator (offline) */
.narrator-row{margin:10px 16px;padding:12px 16px;background:rgba(255,255,255,.9);border-radius:8px;font-size:14px;line-height:1.8;color:#333;border-left:3px solid var(--green);font-style:italic}

/* Moments */
.moment-header{height:280px;position:relative;background:linear-gradient(135deg,#667eea,#764ba2);overflow:hidden}
.moment-header .cover{width:100%;height:100%;object-fit:cover}
.moment-header .user-info{position:absolute;bottom:16px;right:16px;display:flex;align-items:center;gap:10px}
.moment-header .user-info .name{color:#fff;font-size:17px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.moment-header .user-info img{width:60px;height:60px;border-radius:8px;border:2px solid #fff}

.moment-card{padding:12px 16px;background:var(--white);border-bottom:8px solid var(--bg)}
.moment-card .mc-header{display:flex;gap:10px;margin-bottom:8px}
.moment-card .mc-header img{width:42px;height:42px;border-radius:6px;cursor:pointer}
.moment-card .mc-header .mc-name{font-size:15px;color:var(--blue);font-weight:600;cursor:pointer}
.moment-card .mc-body{margin-left:52px}
.moment-card .mc-text{font-size:15px;line-height:1.6;margin-bottom:8px;word-break:break-word}
.moment-card .mc-images{display:grid;gap:4px;margin-bottom:8px}
.moment-card .mc-images.c1{grid-template-columns:1fr;max-width:240px}
.moment-card .mc-images.c2{grid-template-columns:1fr 1fr;max-width:320px}
.moment-card .mc-images.c3,.moment-card .mc-images.c4,.moment-card .mc-images.c5,.moment-card .mc-images.c6,.moment-card .mc-images.c7,.moment-card .mc-images.c8,.moment-card .mc-images.c9{grid-template-columns:repeat(3,1fr);max-width:320px}
.moment-card .mc-images img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer}
.moment-card .mc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.moment-card .mc-footer .mc-time{font-size:12px;color:var(--text3)}
.moment-card .mc-footer .mc-action{font-size:20px;cursor:pointer;background:var(--input-bg);padding:2px 10px;border-radius:4px}
.moment-card .mc-likes{background:var(--input-bg);padding:6px 10px;border-radius:4px;margin-top:6px;font-size:13px;color:var(--blue)}
.moment-card .mc-comments{background:var(--input-bg);padding:6px 10px;border-radius:0 0 4px 4px;font-size:13px}
.moment-card .mc-comments .cmt{margin-bottom:4px;line-height:1.5}
.moment-card .mc-comments .cmt .cmt-name{color:var(--blue);font-weight:500;cursor:pointer}
.moment-card .mc-loc{font-size:12px;color:var(--blue);margin-bottom:4px}

/* Compose */
.compose-area textarea{width:100%;min-height:120px;border:none;padding:16px;font-size:16px;outline:none;resize:none;background:var(--white)}
.compose-imgs{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 16px;background:var(--white)}
.compose-imgs .img-item{width:80px;height:80px;border-radius:6px;overflow:hidden;position:relative}
.compose-imgs .img-item img{width:100%;height:100%;object-fit:cover}
.compose-imgs .add-img{width:80px;height:80px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text3);cursor:pointer}

/* Profile */
.profile-card{background:var(--white);padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:12px}
.profile-card img{width:80px;height:80px;border-radius:12px}
.profile-card .name{font-size:20px;font-weight:600}
.profile-card .sig{font-size:13px;color:var(--text3);text-align:center;max-width:80%}
.profile-card .persona{font-size:12px;color:var(--text2);text-align:left;width:100%;padding:10px;background:var(--input-bg);border-radius:6px;max-height:100px;overflow-y:auto;margin-top:4px}

/* Buttons */
.btn-primary{width:100%;padding:12px;border:none;border-radius:8px;background:var(--green);color:#fff;font-size:16px;cursor:pointer;font-weight:600}
.btn-primary:active{opacity:.8}
.btn-danger{width:100%;padding:12px;border:none;border-radius:8px;background:var(--red);color:#fff;font-size:16px;cursor:pointer}
.btn-outline{padding:8px 20px;border:1px solid var(--green);color:var(--green);background:transparent;border-radius:6px;cursor:pointer;font-size:14px}

/* Form */
.form-group{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:15px;outline:none;background:var(--white);font-family:inherit}
.form-group textarea{min-height:80px;resize:vertical}

/* Wallet */
.wallet-card{margin:20px 16px;padding:30px;background:linear-gradient(135deg,var(--green),#059142);border-radius:16px;color:#fff;text-align:center}
.wallet-card .label{font-size:14px;opacity:.8}
.wallet-card .amount{font-size:36px;font-weight:700;margin:10px 0}

/* Shop */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.shop-item{background:var(--white);border-radius:10px;overflow:hidden;cursor:pointer}
.shop-item .emoji{font-size:48px;text-align:center;padding:20px;background:var(--input-bg)}
.shop-item .info{padding:8px}
.shop-item .info .name{font-size:14px;font-weight:500}
.shop-item .info .price{font-size:15px;color:var(--red);font-weight:600}
.shop-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}

/* Forum */
.forum-card{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.forum-card .fc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.forum-card .fc-header img{width:32px;height:32px;border-radius:50%}
.forum-card .fc-title{font-size:16px;font-weight:600;margin-bottom:4px}
.forum-card .fc-content{font-size:14px;color:var(--text2);line-height:1.5}
.forum-card .fc-stats{display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--text3)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--white);border-radius:12px;width:85%;max-width:360px;max-height:85vh;overflow-y:auto;padding:20px}
.modal-box h3{font-size:17px;text-align:center;margin-bottom:16px}
.modal-box .modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-box .modal-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:15px;cursor:pointer}
.modal-box .modal-btns .cancel{background:var(--input-bg);color:var(--text)}
.modal-box .modal-btns .confirm{background:var(--green);color:#fff}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:2000;pointer-events:none;animation:fadeInOut 2s ease}
@keyframes fadeInOut{0%{opacity:0}15%{opacity:1}85%{opacity:1}100%{opacity:0}}

/* Image viewer */
.img-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:3000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-viewer img{max-width:100%;max-height:100%;object-fit:contain}

/* Auth page */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);padding:24px}
.auth-box{background:var(--white);border-radius:16px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.auth-box .logo{text-align:center;font-size:48px;margin-bottom:8px}
.auth-box h2{text-align:center;font-size:20px;margin-bottom:24px;color:var(--text)}
.auth-box input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:12px;outline:none}
.auth-box input:focus{border-color:var(--green)}
.auth-box .auth-err{color:var(--red);font-size:13px;text-align:center;margin-bottom:8px}
.auth-box .auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--blue);cursor:pointer}

/* Loading */
.typing-indicator{display:flex;gap:4px;padding:10px 14px}
.typing-indicator span{width:8px;height:8px;border-radius:50%;background:var(--text3);animation:typing 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* Backpack grid */
.bp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px}
.bp-item{background:var(--white);border-radius:10px;padding:12px;text-align:center}
.bp-item .emoji{font-size:36px}
.bp-item .name{font-size:13px;margin-top:4px}
.bp-item .count{font-size:12px;color:var(--text3)}

/* Sticker grid */
.stk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px}
.stk-item{text-align:center;cursor:pointer;position:relative}
.stk-item img{width:100%;aspect-ratio:1;object-fit:contain;border-radius:6px;background:var(--input-bg)}
.stk-item .desc{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* WB */
.wb-card{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer}
.wb-card .wb-name{font-size:15px;font-weight:600}
.wb-card .wb-meta{font-size:12px;color:var(--text3);margin-top:2px}
.wb-card .wb-preview{font-size:13px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Media */
.media-card{display:flex;align-items:center;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer}
.media-card .thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;margin-right:12px;background:var(--input-bg)}
.media-card .info{flex:1}
.media-card .info .name{font-size:15px}
.media-card .info .meta{font-size:12px;color:var(--text3)}

/* OA */
.oa-item{display:flex;align-items:center;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.oa-item .oa-icon{font-size:36px;margin-right:12px}
.oa-item .oa-info{flex:1}
.oa-item .oa-info .name{font-size:15px;font-weight:500}
.oa-item .oa-info .desc{font-size:12px;color:var(--text3)}

/* Article */
.article-view{padding:20px 16px}
.article-view h1{font-size:22px;font-weight:700;line-height:1.4;margin-bottom:12px}
.article-view .meta{font-size:12px;color:var(--text3);margin-bottom:20px}
.article-view .body{font-size:16px;line-height:1.8}
.article-view .body p{margin-bottom:12px}

/* RP detail */
.rp-detail{display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.rp-detail .rp-icon{font-size:64px;margin-bottom:16px}
.rp-detail .rp-from{font-size:18px;font-weight:600}
.rp-detail .rp-wish{font-size:14px;color:var(--text2);margin:8px 0}
.rp-detail .rp-amount{font-size:48px;font-weight:700;color:var(--orange);margin:16px 0}

/* Scrollbar */
::-webkit-scrollbar{width:0;background:transparent}

/* Responsive */
@media(min-width:431px){
  #app{border-left:1px solid #333;border-right:1px solid #333}
}

/* Fix for form in section item */
.section-item input[type="file"]{display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ================= UTILITY LAYER (U) =================
const U = {
  uid: () => 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2,8),
  ts: () => Date.now(),
  fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts), now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const hm = pad(d.getHours()) + ':' + pad(d.getMinutes());
    if (d.toDateString() === now.toDateString()) return hm;
    const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
    if (d.toDateString() === yesterday.toDateString()) return '昨天 ' + hm;
    return `${d.getMonth()+1}/${d.getDate()} ${hm}`;
  },
  fmtDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  },
  hash(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
  },
  colors: ['#f56c6c','#e6a23c','#67c23a','#409eff','#909399','#9b59b6','#1abc9c','#e74c3c','#3498db','#2ecc71','#f39c12','#8e44ad'],
  avatarSvg(name) {
    const c = U.colors[U.hash(name||'?') % U.colors.length];
    const ch = (name||'?').slice(0,1);
    return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="8" fill="${c}"/><text x="40" y="52" text-anchor="middle" fill="#fff" font-size="36" font-family="sans-serif">${ch}</text></svg>`)}`;
  },
  esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  },
  nl2br(s) { return U.esc(s).replace(/\n/g,'<br>'); },
  truncate(s, n=80) { return s && s.length > n ? s.slice(0,n)+'...' : (s||''); },
  randomPick(arr) { return arr[Math.floor(Math.random()*arr.length)]; },
  sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
};

const SV = {
  token: localStorage.getItem('wcs_token') || '',
  setToken(t) { this.token = t; if(t) localStorage.setItem('wcs_token', t); else localStorage.removeItem('wcs_token'); },
  async req(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (this.token) opts.headers['x-token'] = this.token;
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Request failed');
    return j;
  },
  get(url) { return this.req('GET', url); },
  post(url, body) { return this.req('POST', url, body); },
  async upload(file) {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch('/api/upload', { method: 'POST', headers: { 'x-token': this.token }, body: fd });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Upload failed');
    return j.url;
  }
};

      /(\{[\s\S]*\})/
    ];
    for (const p of patterns) {
      const m = text.match(p);

角色: ${friend ? friend.name+' - '+(friend.persona||'') : ''}
玩家: ${player} ${persona ? '- '+persona : ''}
${memory ? '【记忆】\n'+memory : ''}
${topic ? '【对话主题/方向】\n'+topic : ''}

以JSON数组格式回复，交替生成玩家和角色的消息:
[{"sender":"player","name":"${player}","text":"消息","type":"text"},{"sender":"char","name":"${friend?friend.name:'角色'}","text":"回复","type":"text"},...]

要求:

- 只返回JSON数组`;

    const msgs = history.slice(-10).map(m => `[${m.senderName||m.sender}]: ${m.text||'['+m.type+']'}`).join('\n');
    const raw = await this.gen(system, [{ role: 'user', content: msgs || '开始对话' }], { maxTokens: 8192 });

  },

  // Generate daily moments for all friends
  async genDailyMoments() {
    const friends = D.getFriends();
    const player = D.get('playerName');
    const persona = D.get('playerPersona');
    if (friends.length === 0) return [];

    const system = `为所有角色和玩家生成一天的朋友圈动态(早中晚)。

角色: ${friendList}
玩家: ${player} ${persona ? '('+U.truncate(persona,30)+')' : ''}

要求:

- 玩家也有1-2条
- 内容多样自然
- 有互动(互相点赞评论)
- 只返回JSON数组`;

    const raw = await this.gen(system, [{ role: 'user', content: '生成今日朋友圈' }], { maxTokens: 8192 });

  pgChatList() {
    const friends = D.getFriends();
    const groups = D.getGroups();
    const histories = D.data.chatHistories || {};
    
    // Build chat list items sorted by last message time
    let items = [];
    const addItem = (id, name, avatar, isGroup) => {
      const hist = histories[id] || [];
      const lastMsg = hist[hist.length - 1];
      if (!lastMsg && !isGroup) return; // Skip if no messages
      items.push({ id, name, avatar, isGroup, lastMsg, time: lastMsg ? lastMsg.ts : 0 });
    };
    
    friends.forEach(f => addItem(f.id, f.name, this.getAvatar(f), false));
    groups.forEach(g => addItem(g.id, g.name, U.avatarSvg(g.name), true));
    
    // Also add items that have chat history but might not be in friends (edge case)
    items.sort((a, b) => b.time - a.time);

    const listHtml = items.map(it => {
      const lastText = it.lastMsg ? (it.lastMsg.type === 'image' ? '[图片]' : it.lastMsg.type === 'sticker' ? '[表情]' : it.lastMsg.type === 'redpacket' ? '[红包]' : it.lastMsg.type === 'gift' ? '[礼物]' : it.lastMsg.type === 'video' ? '[视频]' : it.lastMsg.type === 'location' ? '[位置]' : it.lastMsg.type === 'narrator' ? '[旁白]' : U.truncate(it.lastMsg.text || '', 30)) : '';

        msgsHtml += `<div class="msg-system">${U.esc(m.text)}</div>`;
        return;
      }
      if (m.type === 'pat') {

    // Menu actions
    const menuAction = `<span onclick="App.chatMenu()">⋯</span>`;
    const modeLabel = mode === 'offline' ? ' [线下]' : '';

    return `<div class="page">${this.statusBar()}${quickBtns}${this.navbar(name + modeLabel, true, menuAction)}<div class="chat-area" style="${bg?'background:url('+U.esc(bg)+') center/cover no-repeat':''}">${msgsHtml}</div>${selectBar}<div class="chat-input-bar"><div class="btn" onclick="App.toggleStickerPanel()">😊</div><textarea id="chatInput" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();App.sendMsg()}"></textarea><div class="btn" onclick="App.toggleMore()">➕</div><button class="send-btn" onclick="App.sendMsg()">发送</button></div>${stickerHtml}${moreHtml}</div>`;
  },

  // Chat methods
  sendMsg() {
    const input = document.getElementById('chatInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    const msg = {
      id: U.uid(), type: 'text', text,
      sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'),
      ts: U.ts()
    };

    if (this.chatMode === 'offline') {
      D.addOfflineMsg(this.chatId, msg);
    } else {
      D.addMsg(this.chatId, msg);
    }
    this.renderPage();
  },

  async doChatReply() {
    if (this.isGenerating) return;
    this.isGenerating = true;
    this.renderPage();
    try {
      const reply = await AI.chatReply(this.chatId, this.chatIsGroup);
      const replies = Array.isArray(reply) ? reply : [reply];
      const friend = D.getFriend(this.chatId);
      
      for (const r of replies) {
        const senderName = r.sender || r.senderName || (friend ? friend.name : '角色');
        const senderFriend = D.getFriendByName(senderName) || friend;
        const msg = {
          id: U.uid(),
          type: r.type || 'text',
          text: r.text || r.content || '',
          sender: senderName,
          senderId: senderFriend ? senderFriend.id : this.chatId,
          senderName,
          ts: U.ts(),
          imageUrl: r.imageUrl,
          location: r.location,
          stickerUrl: r.stickerUrl
        };
        D.addMsg(this.chatId, msg);
        await U.sleep(300); // Small delay between messages
      }
    } catch(e) {
      this.toast('AI回复失败: ' + e.message);
    }
    this.isGenerating = false;
    this.renderPage();
  },

  async doPlayerAutoReply() {
    if (this.isGenerating) return;
    this.isGenerating = true;
    this.renderPage();
    try {
      const reply = await AI.genPlayerMessage(this.chatId, this.chatIsGroup);
      const msg = {
        id: U.uid(), type: reply.type || 'text', text: reply.text || '',
        sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'),
        ts: U.ts(), imageUrl: reply.imageUrl
      };
      if (this.chatMode === 'offline') D.addOfflineMsg(this.chatId, msg);
      else D.addMsg(this.chatId, msg);
    } catch(e) { this.toast('生成失败: ' + e.message); }
    this.isGenerating = false;
    this.renderPage();
  },

  async doCharReroll() {
    // Delete last AI message and regenerate
    const history = D.getHistory(this.chatId);
    const lastAI = [...history].reverse().find(m => m.senderId !== 'player');
    if (lastAI) D.delMsg(this.chatId, lastAI.id);
    await this.doChatReply();
  },

  async doPlayerReroll() {
    const history = D.getHistory(this.chatId);
    const lastPlayer = [...history].reverse().find(m => m.senderId === 'player');
    if (lastPlayer) D.delMsg(this.chatId, lastPlayer.id);
    await this.doPlayerAutoReply();
  },

  async doAutoConversation() {
    const rounds = prompt('生成几轮对话？(1轮=玩家+角色各1条)', '5');
    if (!rounds) return;
    const topic = prompt('对话主题/方向(留空=自由发挥)', '');
    
    this.isGenerating = true;
    this.renderPage();
    try {
      const conv = await AI.genAutoConversation(this.chatId, parseInt(rounds) || 5, topic || '');
      if (Array.isArray(conv)) {
        const friend = D.getFriend(this.chatId);
        let timeOffset = 0;
        for (const c of conv) {
          timeOffset += Math.random() * 30000 + 10000; // 10-40s between messages
          const isPlayer = c.sender === 'player' || c.name === D.get('playerName');
          const msg = {
            id: U.uid(),
            type: c.type || 'text',
            text: c.text || '',
            sender: c.name || (isPlayer ? D.get('playerName') : (friend ? friend.name : '角色')),
            senderId: isPlayer ? 'player' : (friend ? friend.id : this.chatId),
            senderName: c.name || (isPlayer ? D.get('playerName') : (friend ? friend.name : '角色')),
            ts: U.ts() - (conv.length - conv.indexOf(c)) * 30000 + timeOffset,
            imageUrl: c.imageUrl
          };
          D.addMsg(this.chatId, msg);
        }
      }
    } catch(e) { this.toast('生成失败: ' + e.message); }
    this.isGenerating = false;
    this.renderPage();
  },

  toggleChatMode() {
    this.chatMode = this.chatMode === 'online' ? 'offline' : 'online';
    this.renderPage();
  },

  toggleMore() {
    this.showMore = !this.showMore;
    this.showStickerPanel = false;
    this.renderPage();
  },

  toggleStickerPanel() {
    this.showStickerPanel = !this.showStickerPanel;
    this.showMore = false;
    this.renderPage();
  },

  sendSticker(idx) {
    const stickers = D.getStickers();
    if (!stickers[idx]) return;
    const msg = {
      id: U.uid(), type: 'sticker', text: stickers[idx].desc || '[表情]',
      stickerUrl: stickers[idx].url, imageUrl: stickers[idx].url,
      sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'),
      ts: U.ts()
    };
    D.addMsg(this.chatId, msg);
    this.showStickerPanel = false;
    this.renderPage();
  },

  sendPhoto() {
    const url = prompt('输入图片链接(或留空上传)');
    if (url) {
      this._doSendMedia('image', url);
    } else {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = async () => {
        if (!input.files[0]) return;
        try {
          const uploadedUrl = await SV.upload(input.files[0]);
          this._doSendMedia('image', uploadedUrl);
        } catch(e) { this.toast('上传失败'); }
      };
      input.click();
    }
  },

  sendVideo() {
    const url = prompt('输入视频链接');
    if (url) this._doSendMedia('video', url);
  },

  sendLocation() {
    const loc = prompt('输入位置名称');
    if (loc) {
      const msg = {
        id: U.uid(), type: 'location', text: loc, location: loc,
        sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'), ts: U.ts()
      };
      D.addMsg(this.chatId, msg);
      this.renderPage();
    }
  },

  _doSendMedia(type, url) {
    const msg = {
      id: U.uid(), type, text: type === 'image' ? '' : '[视频]',
      imageUrl: url,
      sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'), ts: U.ts()
    };
    D.addMsg(this.chatId, msg);
    D.addToMediaIndex(type, url);
    this.showMore = false;
    this.renderPage();
  },

  sendRP() {
    const amount = prompt('红包金额');
    const wish = prompt('祝福语', '恭喜发财，大吉大利');
    if (!amount) return;
    const a = parseFloat(amount);
    if (isNaN(a) || a <= 0) { this.toast('金额无效'); return; }
    const balance = D.get('walletBalance') || 0;
    if (a > balance) { this.toast('余额不足'); return; }
    D.set('walletBalance', balance - a);
    const msg = {
      id: U.uid(), type: 'redpacket', text: `[红包] ${wish}`,
      rpAmount: a, rpWish: wish || '恭喜发财', opened: false,
      sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'), ts: U.ts()
    };
    D.addMsg(this.chatId, msg);
    this.showMore = false;
    this.renderPage();
  },

  openRP(msgId) {
    const history = D.getHistory(this.chatId);
    const msg = history.find(m => m.id === msgId);
    if (!msg || msg.type !== 'redpacket') return;
    if (msg.opened) {
      this.viewingRP = msg;
      this.nav('rp-detail');
      return;
    }
    if (msg.senderId === 'player') {
      this.toast('不能打开自己的红包');
      return;
    }
    msg.opened = true;
    msg.openedBy = D.get('playerName');
    D.set('walletBalance', (D.get('walletBalance') || 0) + (msg.rpAmount || 0));
    D.save();
    this.toast(`领取了 ¥${(msg.rpAmount||0).toFixed(2)}`);
    this.renderPage();
  },

  sendGift() {
    const name = prompt('礼物名称');
    if (!name) return;
    const msg = {
      id: U.uid(), type: 'gift', text: `[礼物] ${name}`, giftName: name,
      sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'), ts: U.ts()
    };
    D.addMsg(this.chatId, msg);
    this.showMore = false;
    this.renderPage();
  },

  doPat() {
    const friend = D.getFriend(this.chatId);
    const name = friend ? friend.name : '对方';
    const msg = {
      id: U.uid(), type: 'pat', text: `${D.get('playerName')} 拍了拍 ${name}`,
      sender: 'system', senderId: 'system', ts: U.ts()
    };
    D.addMsg(this.chatId, msg);
    this.showMore = false;
    this.renderPage();
  },

  sendFromBP() {
    const bp = D.get('backpack') || [];
    if (bp.length === 0) { this.toast('背包是空的'); return; }
    const items = bp.map((b, i) => `${i+1}. ${b.emoji||'📦'} ${b.name} ×${b.count||1}`).join('\n');
    const choice = prompt(`选择要送出的物品序号:\n${items}`);
    if (!choice) return;
    const idx = parseInt(choice) - 1;
    if (idx < 0 || idx >= bp.length) { this.toast('无效选择'); return; }
    const item = bp[idx];
    const msg = {
      id: U.uid(), type: 'gift', text: `[背包物品] ${item.emoji||'📦'} ${item.name}`,
      giftName: `${item.emoji||'📦'} ${item.name}`,
      sender: D.get('playerName'), senderId: 'player', senderName: D.get('playerName'), ts: U.ts()
    };
    D.addMsg(this.chatId, msg);
    if ((item.count || 1) <= 1) D.removeBackpack(idx);
    else { bp[idx].count = (item.count || 1) - 1; D.set('backpack', bp); }
    this.showMore = false;
    this.renderPage();
  },

  chatMenu() {
    const html = `<div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-primary" onclick="App.enterSelectMode();App.closeModal()">☑️ 多选消息</button>
      <button class="btn-primary" style="background:var(--blue)" onclick="App.doSummarizeMemory();App.closeModal()">🧠 总结记忆</button>
      <button class="btn-primary" style="background:#666" onclick="App.changeChatBg();App.closeModal()">🖼️ 聊天背景</button>
      <button class="btn-danger" onclick="App.clearHistory('${this.chatId}');App.closeModal()">🗑️ 清空记录</button>
    </div>`;
    this.modal('聊天菜单', html, () => {}, '', '关闭');
  },

  enterSelectMode() { this.selectMode = true; this.selectedMsgs.clear(); this.renderPage(); },
  exitSelectMode() { this.selectMode = false; this.selectedMsgs.clear(); this.renderPage(); },
  
  toggleMsgSel(id) {
    if (this.selectedMsgs.has(id)) this.selectedMsgs.delete(id);
    else this.selectedMsgs.add(id);
    this.renderPage();
  },

  deleteSelectedMsgs() {
    if (this.selectedMsgs.size === 0) { this.toast('请先选择消息'); return; }
    const ids = [...this.selectedMsgs];
    if (this.chatMode === 'offline') D.delOfflineMsgs(this.chatId, ids);
    else D.delMsgs(this.chatId, ids);
    this.exitSelectMode();
  },

  clearHistory(chatId) {
    if (!confirm('确定清空所有聊天记录？')) return;
    D.clearHistory(chatId);
    this.renderPage();
  },

  changeChatBg() {
    const url = prompt('输入背景图片链接(留空清除)');
    D.setChatBg(this.chatId, url || '');
    this.renderPage();
  },

  async doSummarizeMemory() {
    this.toast('正在总结记忆...');
    try {
      const summary = await AI.summarizeMemory(this.chatId);
      D.setMemorySummary(this.chatId, summary);
      this.toast('记忆总结完成');
      alert('记忆摘要:\n\n' + summary);
    } catch(e) { this.toast('总结失败: ' + e.message); }
  },
  // ===== MOMENTS =====
  pgMoments() {
    const moments = D.get('moments') || [];
    const player = D.get('playerName');
    const playerAvatar = this.getPlayerAvatar();
    const momentBg = D.get('momentBg') || '';
    const selMode = this.momentSelMode;

    const headerHtml = `<div class="moment-header">${momentBg ? `<img class="cover" src="${U.esc(momentBg)}">` : ''}<div class="user-info"><span class="name">${U.esc(player)}</span><img src="${U.esc(playerAvatar)}" onerror="this.src='${U.avatarSvg(player)}'"></div></div>`;

    const momentsHtml = moments.slice().reverse().map((m, ri) => {
      const idx = moments.length - 1 - ri;
      const authorFriend = D.getFriendByName(m.authorName) || D.getFriend(m.authorId);
      const avatar = m.isPlayer ? playerAvatar : this.getAvatar(authorFriend || { name: m.authorName });
      
      const imagesHtml = (m.images || []).length > 0 ? `<div class="mc-images c${Math.min(m.images.length,9)}">${m.images.map(img => `<img src="${U.esc(img)}" onclick="App.viewImg('${U.esc(img)}')" onerror="this.style.display='none'">`).join('')}</div>` : '';

      const likesHtml = (m.likes || []).length > 0 ? `<div class="mc-likes">❤️ ${m.likes.map(l => U.esc(l)).join('，')}</div>` : '';

      const commentsHtml = (m.comments || []).length > 0 ? `<div class="mc-comments">${m.comments.map(c => `<div class="cmt"><span class="cmt-name">${U.esc(c.name)}</span>${c.replyTo ? ` 回复 <span class="cmt-name">${U.esc(c.replyTo)}</span>` : ''}: ${U.esc(c.text)} ${c.img?`<br><img src="${U.esc(c.img)}" style="max-width:120px;border-radius:4px;margin-top:4px" onclick="App.viewImg('${U.esc(c.img)}')">`:''}</div>`).join('')}</div>` : '';

      const selCheck = selMode ? `<input type="checkbox" ${this.selectedMoments.has(idx)?'checked':''} onchange="App.toggleMomentSel(${idx})" style="margin-right:8px">` : '';

      return `<div class="moment-card"><div class="mc-header">${selCheck}<img src="${U.esc(avatar)}" onerror="this.src='${U.avatarSvg(m.authorName||'?')}'"><div><div class="mc-name">${U.esc(m.authorName || '匿名')}</div></div></div><div class="mc-body"><div class="mc-text">${U.nl2br(m.text || '')}</div>${imagesHtml}${m.location ? `<div class="mc-loc">📍 ${U.esc(m.location)}</div>` : ''}<div class="mc-footer"><span class="mc-time">${U.fmtTime(m.ts)}</span><span class="mc-action" onclick="App.momentAction(${idx})">💬</span></div>${likesHtml}${commentsHtml}</div></div>`;
    }).join('');

    const selBar = selMode ? `<div style="padding:8px 16px;background:var(--white);display:flex;gap:8px"><button class="btn-outline" onclick="App.momentSelMode=false;App.selectedMoments.clear();App.renderPage()">取消</button><button class="btn-outline" style="border-color:var(--red);color:var(--red)" onclick="App.deleteSelectedMoments()">删除选中</button></div>` : '';

    const actions = `<span onclick="App.momentSelMode=!App.momentSelMode;App.selectedMoments.clear();App.renderPage()">☑️</span><span onclick="App.nav('compose-moment')">📷</span>`;

    return `<div class="page">${this.statusBar()}${this.navbar('朋友圈', true, actions)}<div class="content">${headerHtml}${selBar}${momentsHtml}<div style="text-align:center;padding:20px;color:var(--text3)">— 没有更多了 —</div></div></div>`;
  },

  toggleMomentSel(idx) {
    if (this.selectedMoments.has(idx)) this.selectedMoments.delete(idx);
    else this.selectedMoments.add(idx);
    this.renderPage();
  },

  deleteSelectedMoments() {
    if (this.selectedMoments.size === 0) { this.toast('请先选择'); return; }
    const moments = D.get('moments') || [];
    const idxs = [...this.selectedMoments].sort((a,b) => b-a);
    idxs.forEach(i => moments.splice(i, 1));
    D.set('moments', moments);
    this.momentSelMode = false;
    this.selectedMoments.clear();
    this.renderPage();
  },

  momentAction(idx) {
    const moments = D.get('moments') || [];
    const m = moments[idx];
    if (!m) return;
    const html = `<div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-primary" onclick="App.doMomentLike(${idx});App.closeModal()">❤️ 点赞</button>
      <div><textarea id="momentComment" placeholder="写评论..." style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:14px" rows="2"></textarea></div>
      <button class="btn-primary" onclick="App.doMomentComment(${idx});App.closeModal()">💬 评论</button>
      <button class="btn-primary" style="background:var(--blue)" onclick="App.aiReactMoment(${idx});App.closeModal()">🤖 AI互动</button>
    </div>`;
    this.modal('互动', html, () => {}, '', '关闭');
  },

  doMomentLike(idx) {
    const moments = D.get('moments');
    const m = moments[idx];
    if (!m.likes) m.likes = [];
    const name = D.get('playerName');
    if (!m.likes.includes(name)) m.likes.push(name);
    D.set('moments', moments);
    this.renderPage();
  },

  doMomentComment(idx) {
    const text = document.getElementById('momentComment')?.value?.trim();
    if (!text) return;
    const moments = D.get('moments');
    const m = moments[idx];
    if (!m.comments) m.comments = [];
    m.comments.push({ name: D.get('playerName'), text });
    D.set('moments', moments);
    this.renderPage();
  },

  async aiReactMoment(idx) {
    this.toast('AI正在互动...');
    try {
      const moments = D.get('moments');
      const m = moments[idx];
      const friends = D.getFriends();
      // Random friends react
      const reactors = friends.sort(() => Math.random() - 0.5).slice(0, Math.min(3, friends.length));
      
      for (const f of reactors) {
        if (!m.likes) m.likes = [];
        if (Math.random() > 0.4 && !m.likes.includes(f.name)) m.likes.push(f.name);
        
        if (Math.random() > 0.3) {
          const cmt = await AI.momentComments(m, f.name);
          if (!m.comments) m.comments = [];
          m.comments.push({ name: f.name, text: cmt.text || '👍' });
        }
      }
      D.set('moments', moments);
      this.renderPage();
    } catch(e) { this.toast('AI互动失败: ' + e.message); }
  },

  // ===== COMPOSE MOMENT =====
  pgComposeMoment() {
    return `<div class="page">${this.statusBar()}${this.navbar('发表', true, '<span onclick="App.publishMoment()" style="color:var(--green);font-weight:600;font-size:15px">发表</span>')}<div class="content"><textarea class="compose-area" id="momentText" placeholder="这一刻的想法..." style="width:100%;min-height:120px;border:none;padding:16px;font-size:16px;outline:none;resize:none"></textarea><div class="compose-imgs" id="momentImgs"><div class="add-img" onclick="App.addMomentImg()">+</div></div><div class="form-group"><label>图片链接</label><input id="momentImgUrl" placeholder="粘贴图片链接后点+添加"></div><div class="form-group"><label>📍 定位</label><input id="momentLoc" placeholder="你在哪里"></div></div></div>`;
  },

  addMomentImg() {
    const url = document.getElementById('momentImgUrl')?.value?.trim();
    if (!url) {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = async () => {
        if (!input.files[0]) return;
        try {
          const uploadedUrl = await SV.upload(input.files[0]);
          this._addMomentImgEl(uploadedUrl);
        } catch(e) { this.toast('上传失败'); }
      };
      input.click();
      return;
    }
    this._addMomentImgEl(url);
    document.getElementById('momentImgUrl').value = '';
  },

  _addMomentImgEl(url) {
    const container = document.getElementById('momentImgs');
    const addBtn = container.querySelector('.add-img');
    const div = document.createElement('div');
    div.className = 'img-item';
    div.innerHTML = `<img src="${U.esc(url)}" data-url="${U.esc(url)}">`;
    div.onclick = () => div.remove();
    container.insertBefore(div, addBtn);
  },

  async publishMoment() {
    const text = document.getElementById('momentText')?.value?.trim();
    const loc = document.getElementById('momentLoc')?.value?.trim();
    const imgEls = document.querySelectorAll('#momentImgs .img-item img');
    const images = [...imgEls].map(el => el.dataset.url).filter(Boolean);

    if (!text && images.length === 0) { this.toast('请输入内容'); return; }

    const moments = D.get('moments') || [];
    const moment = {
      id: U.uid(),
      authorId: 'player',
      authorName: D.get('playerName'),
      isPlayer: true,
      text: text || '',
      images,
      location: loc || '',
      likes: [],
      comments: [],
      ts: U.ts()
    };
    moments.push(moment);
    D.set('moments', moments);
    this.toast('已发表');

    // Auto AI reactions
    this.aiReactMoment(moments.length - 1);
    this.goBack();
  },

  // ===== PROFILE =====
  viewContactProfile(id) {
    if (!id || id === 'player' || id === 'system') return;
    this.viewingProfile = id;
    this.nav('profile');
  },

  pgProfile() {
    const friend = D.getFriend(this.viewingProfile);
    if (!friend) return `<div class="page">${this.navbar('详细资料')}<div class="content"><div style="text-align:center;padding:40px;color:var(--text3)">找不到该联系人</div></div></div>`;

    return `<div class="page">${this.statusBar()}${this.navbar('详细资料')}<div class="content"><div class="profile-card"><img src="${U.esc(this.getAvatar(friend))}" onerror="this.src='${U.avatarSvg(friend.name)}'"><div class="name">${U.esc(friend.name)}</div><div class="sig">${U.esc(friend.signature || friend.id)}</div>${friend.persona ? `<div class="persona">${U.nl2br(friend.persona)}</div>` : ''}</div><div class="section"><button class="btn-primary" style="margin:16px" onclick="App.openChat('${friend.id}',false)">发消息</button><button class="btn-outline" style="margin:0 16px;width:calc(100% - 32px)" onclick="App.editingProfile='${friend.id}';App.nav('edit-profile')">✏️ 编辑资料</button><button class="btn-danger" style="margin:16px" onclick="App.doDeleteFriend('${friend.id}')">删除好友</button></div></div></div>`;
  },

  doDeleteFriend(id) {
    if (!confirm('确定删除该好友？')) return;
    D.removeFriend(id);
    this.toast('已删除');
    this.goBack();
  },

  // ===== EDIT PROFILE =====
  pgEditProfile() {
    const friend = D.getFriend(this.editingProfile || this.viewingProfile);
    if (!friend) return this.pgProfile();

    return `<div class="page">${this.statusBar()}${this.navbar('编辑资料', true, '<span onclick="App.saveEditProfile()" style="color:var(--green);font-size:15px">保存</span>')}<div class="content"><div class="form-group"><label>昵称</label><input id="epName" value="${U.esc(friend.name)}"></div><div class="form-group"><label>头像链接</label><input id="epAvatar" value="${U.esc(friend.avatar||'')}"></div><div class="form-group"><label>签名</label><input id="epSig" value="${U.esc(friend.signature||'')}"></div><div class="form-group"><label>人设</label><textarea id="epPersona" rows="6">${U.esc(friend.persona||'')}</textarea></div><div class="form-group"><label>聊天风格</label><input id="epStyle" value="${U.esc(friend.style||'')}"></div></div></div>`;
  },

  saveEditProfile() {
    const id = this.editingProfile || this.viewingProfile;
    D.updateFriend(id, {
      name: document.getElementById('epName')?.value?.trim() || '',
      avatar: document.getElementById('epAvatar')?.value?.trim() || '',
      signature: document.getElementById('epSig')?.value?.trim() || '',
      persona: document.getElementById('epPersona')?.value || '',
      style: document.getElementById('epStyle')?.value?.trim() || ''
    });
    this.toast('已保存');
    this.goBack();
