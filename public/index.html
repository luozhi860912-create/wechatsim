  // ===== WALLET =====
  pgWallet() {
    const balance = D.get('walletBalance') || 0;
    return `<div class="page">${this.statusBar()}${this.navbar('钱包')}<div class="content"><div class="wallet-card"><div class="label">余额</div><div class="amount">¥${balance.toFixed(2)}</div></div><button class="btn-primary" style="margin:0 16px;width:calc(100% - 32px)" onclick="App.walletRecharge()">💰 充值</button></div></div>`;
  },

  walletRecharge() {
    const amount = prompt('充值金额');
    if (!amount) return;
    const a = parseFloat(amount);
    if (isNaN(a) || a <= 0) { this.toast('金额无效'); return; }
    D.set('walletBalance', (D.get('walletBalance') || 0) + a);
    this.toast(`充值 ¥${a.toFixed(2)} 成功`);
    this.renderPage();
  },

  // ===== BACKPACK =====
  pgBackpack() {
    const bp = D.get('backpack') || [];
    const itemsHtml = bp.length > 0 ? bp.map((b, i) => `<div class="bp-item" onclick="App.useBackpackItem(${i})"><div class="emoji">${b.emoji || b.icon || '📦'}</div><div class="name">${U.esc(b.name)}</div><div class="count">×${b.count || 1}</div></div>`).join('') : '<div style="grid-column:span 3;text-align:center;padding:40px;color:var(--text3)">背包是空的</div>';
    return `<div class="page">${this.statusBar()}${this.navbar('背包')}<div class="content"><div class="bp-grid">${itemsHtml}</div></div></div>`;
  },

  useBackpackItem(idx) {
    const bp = D.get('backpack');
    if (!bp[idx]) return;
    this.toast(`使用了 ${bp[idx].name}`);
  },

  // ===== STICKERS =====
  pgStickers() {
    const stickers = D.getStickers();
    const grid = stickers.map((s, i) => `<div class="stk-item" onclick="App.removeStickerDialog(${i})"><img src="${U.esc(s.url)}" onerror="this.src='${U.avatarSvg('?')}'"><div class="desc">${U.esc(s.desc || '')}</div></div>`).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('表情包')}<div class="content"><div style="padding:12px;display:flex;gap:8px"><button class="btn-primary" onclick="App.addStickerDialog()">+ 添加表情</button><button class="btn-primary" style="background:var(--blue)" onclick="App.batchImportStickers()">📥 批量导入</button></div><div class="stk-grid">${grid}</div></div></div>`;
  },

  addStickerDialog() {
    const html = `<div class="form-group"><label>图片链接</label><input id="stkUrl" placeholder="图片URL"></div><div class="form-group"><label>描述</label><input id="stkDesc" placeholder="表情描述"></div>`;
    this.modal('添加表情', html, () => {
      const url = document.getElementById('stkUrl')?.value?.trim();
      const desc = document.getElementById('stkDesc')?.value?.trim();
      if (!url) { App.toast('请输入链接'); return; }
      D.addSticker({ url, desc: desc || '' });
      App.renderPage();
    });
  },

  removeStickerDialog(idx) {
    if (confirm('删除这个表情？')) {
      D.removeSticker(idx);
      this.renderPage();
    }
  },

  batchImportStickers() {
    const text = prompt('批量导入(每行一个链接，或 链接|描述 格式)');
    if (!text) return;
    const lines = text.split('\n').filter(l => l.trim());
    const newStickers = lines.map(l => {
      const parts = l.split('|');
      return { url: parts[0].trim(), desc: (parts[1] || '').trim() };
    });
    D.addStickers(newStickers);
    this.toast(`导入了 ${newStickers.length} 个表情`);
    this.renderPage();
  },

  // ===== WORLD BOOK =====
  pgWorldBook() {
    const wbs = D.getWorldBooks();
    const list = wbs.map((w, i) => {
      const typeLabel = w.type === 'global' ? '🌐 全局' : `👤 角色: ${(w.targets||[]).map(t => { const f = D.getFriend(t); return f?f.name:t; }).join(',')}`;
      return `<div class="wb-card" onclick="App.editWB(${i})"><div class="wb-name">${U.esc(w.name)}</div><div class="wb-meta">${typeLabel}</div><div class="wb-preview">${U.esc(U.truncate(w.content||'',80))}</div></div>`;
    }).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('世界书')}<div class="content"><div style="padding:12px;display:flex;gap:8px"><button class="btn-primary" onclick="App.addWB('global')">+ 全局世界书</button><button class="btn-primary" style="background:var(--blue)" onclick="App.addWB('character')">+ 角色世界书</button></div>${list}</div></div>`;
  },

  addWB(type) {
    this.editingWB = { name: '', type, content: '', targets: [], isNew: true };
    this.nav('wb-edit');
  },

  editWB(idx) {
    const wbs = D.getWorldBooks();
    this.editingWB = { ...wbs[idx], idx, isNew: false };
    this.nav('wb-edit');
  },

  pgWBEdit() {
    const wb = this.editingWB;
    if (!wb) return this.pgWorldBook();
    const friends = D.getFriends();
    const targetChecks = wb.type === 'character' ? friends.map(f => `<label style="display:flex;align-items:center;gap:6px;padding:4px 0"><input type="checkbox" class="wbTarget" value="${f.id}" ${(wb.targets||[]).includes(f.id)?'checked':''}> ${U.esc(f.name)}</label>`).join('') : '';

    return `<div class="page">${this.statusBar()}${this.navbar(wb.isNew?'新建世界书':'编辑世界书', true, '<span onclick="App.saveWB()" style="color:var(--green);font-size:15px">保存</span>')}<div class="content"><div class="form-group"><label>名称</label><input id="wbName" value="${U.esc(wb.name)}"></div><div class="form-group"><label>类型</label><select id="wbType" onchange="App.editingWB.type=this.value;App.renderPage()"><option value="global" ${wb.type==='global'?'selected':''}>全局</option><option value="character" ${wb.type==='character'?'selected':''}>角色</option></select></div>${wb.type==='character'?`<div class="form-group"><label>挂载角色</label>${targetChecks}</div>`:''}<div class="form-group"><label>内容</label><textarea id="wbContent" rows="10">${U.esc(wb.content||'')}</textarea></div>${!wb.isNew?`<button class="btn-danger" style="margin:16px" onclick="App.deleteWB(${wb.idx})">删除</button>`:''}</div></div>`;
  },

  saveWB() {
    const wb = this.editingWB;
    const wbs = D.getWorldBooks();
    const data = {
      name: document.getElementById('wbName')?.value?.trim() || '未命名',
      type: document.getElementById('wbType')?.value || 'global',
      content: document.getElementById('wbContent')?.value || '',
      targets: [...document.querySelectorAll('.wbTarget:checked')].map(el => el.value)
    };
    if (wb.isNew) { wbs.push(data); }
    else { Object.assign(wbs[wb.idx], data); }
    D.set('worldBooks', wbs);
    this.toast('已保存');
    this.goBack();
  },

  deleteWB(idx) {
    if (!confirm('确定删除？')) return;
    const wbs = D.getWorldBooks();
    wbs.splice(idx, 1);
    D.set('worldBooks', wbs);
    this.goBack();
  },
  // ===== PERSONA =====
  pgPersona() {
    return `<div class="page">${this.statusBar()}${this.navbar('个人设置', true, '<span onclick="App.savePersona()" style="color:var(--green);font-size:15px">保存</span>')}<div class="content"><div class="form-group"><label>昵称</label><input id="pName" value="${U.esc(D.get('playerName'))}"></div><div class="form-group"><label>头像链接</label><input id="pAvatar" value="${U.esc(D.get('playerAvatar')||'')}"></div><div class="form-group"><label>微信号</label><input id="pId" value="${U.esc(D.get('playerId'))}"></div><div class="form-group"><label>个性签名</label><input id="pSig" value="${U.esc(D.get('playerSignature')||'')}"></div><div class="form-group"><label>人设</label><textarea id="pPersona" rows="6">${U.esc(D.get('playerPersona')||'')}</textarea></div><div class="form-group"><label>聊天背景图链接</label><input id="pChatBg" value="${U.esc(D.get('chatBg')||'')}"></div><div class="form-group"><label>朋友圈封面图链接</label><input id="pMomentBg" value="${U.esc(D.get('momentBg')||'')}"></div></div></div>`;
  },

  savePersona() {
    D.set('playerName', document.getElementById('pName')?.value?.trim() || '我');
    D.set('playerAvatar', document.getElementById('pAvatar')?.value?.trim() || '');
    D.set('playerId', document.getElementById('pId')?.value?.trim() || 'wxid_player');
    D.set('playerSignature', document.getElementById('pSig')?.value?.trim() || '');
    D.set('playerPersona', document.getElementById('pPersona')?.value || '');
    D.set('chatBg', document.getElementById('pChatBg')?.value?.trim() || '');
    D.set('momentBg', document.getElementById('pMomentBg')?.value?.trim() || '');
    this.toast('已保存');
    this.goBack();
  },

  // ===== SETTINGS =====
  pgSettings() {
    const models = D.get('availableModels') || [];
    const modelOpts = models.map(m => `<option value="${U.esc(m)}" ${m===D.get('modelId')?'selected':''}>${U.esc(m)}</option>`).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('API设置')}<div class="content"><div class="section-title">═══ API配置 ═══</div><div class="form-group"><label>API地址</label><input id="sEndpoint" value="${U.esc(D.get('apiEndpoint'))}" placeholder="https://api.openai.com"></div><div class="form-group"><label>API Key</label><input id="sKey" type="password" value="${U.esc(D.get('apiKey'))}"></div><div class="form-group"><label>选择模型</label><div style="display:flex;gap:8px"><select id="sModel" style="flex:1">${modelOpts}<option value="">手动输入</option></select><button class="btn-outline" onclick="App.fetchModels()">拉取</button></div></div><div class="form-group"><label>模型ID (手动)</label><input id="sModelId" value="${U.esc(D.get('modelId'))}"></div><div class="section-title">═══ 参数 ═══</div><div class="form-group"><label>最大Token</label><input id="sMaxTk" type="number" value="${D.get('maxTokens')}"></div><div class="form-group"><label>Temperature</label><input id="sTemp" type="number" step="0.1" value="${D.get('temperature')}"></div><div style="padding:12px;display:flex;gap:8px"><button class="btn-primary" onclick="App.saveSettings()">💾 保存</button><button class="btn-primary" style="background:var(--blue)" onclick="App.testAPI()">🔗 测试</button></div><div class="section-title">═══ 数据管理 ═══</div><div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn-outline" onclick="App.exportData()">📤 导出</button><button class="btn-outline" onclick="App.doImport()">📥 导入</button><button class="btn-outline" style="border-color:var(--red);color:var(--red)" onclick="App.resetData()">🗑 重置</button></div></div></div>`;
  },

  async fetchModels() {
    try {
      // Save current endpoint/key first
      D.set('apiEndpoint', document.getElementById('sEndpoint')?.value?.trim());
      D.set('apiKey', document.getElementById('sKey')?.value?.trim());
      const models = await AI.fetchModels();
      D.set('availableModels', models);
      this.toast(`获取到 ${models.length} 个模型`);
      this.renderPage();
    } catch(e) { this.toast('拉取失败: ' + e.message); }
  },

  saveSettings() {
    D.set('apiEndpoint', document.getElementById('sEndpoint')?.value?.trim());
    D.set('apiKey', document.getElementById('sKey')?.value?.trim());
    const selModel = document.getElementById('sModel')?.value;
    const manualModel = document.getElementById('sModelId')?.value?.trim();
    D.set('modelId', manualModel || selModel || '');
    D.set('maxTokens', parseInt(document.getElementById('sMaxTk')?.value) || 4096);
    D.set('temperature', parseFloat(document.getElementById('sTemp')?.value) || 0.8);
    D.forceSave();
    this.toast('已保存');
  },

  async testAPI() {
    this.saveSettings();
    try {
      const result = await AI.gen('你好，请回复"连接成功"', [{ role: 'user', content: '测试' }], { maxTokens: 50 });
      this.toast('✅ ' + result.slice(0, 50));
    } catch(e) { this.toast('❌ ' + e.message); }
  },

  exportData() {
    const data = JSON.stringify(D.data, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `wechatsim_backup_${U.fmtDate(Date.now())}.json`;
    a.click();
    this.toast('已导出');
  },

  doImport() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = async () => {
      if (!input.files[0]) return;
      try {
        const text = await input.files[0].text();
        const data = JSON.parse(text);
        D.data = { ...D.defaults, ...data };
        await D.forceSave();
        this.toast('导入成功');
        this.renderPage();
      } catch(e) { this.toast('导入失败: ' + e.message); }
    };
    input.click();
  },

  resetData() {
    if (!confirm('确定重置所有数据？此操作不可恢复！')) return;
    if (!confirm('再次确认：真的要删除所有数据吗？')) return;
    D.data = JSON.parse(JSON.stringify(D.defaults));
    D.forceSave();
    this.toast('已重置');
    this.switchTab('chat-list');
  },

  // ===== MEDIA LIBS =====
  pgMediaLibs() {
    const libs = D.getMediaLibs();
    const listHtml = libs.map(lib => {
      const count = (lib.items || []).length;
      return `<div class="media-card" onclick="App.editMediaLib('${lib.id}')"><div class="info"><div class="name">${U.esc(lib.name)}</div><div class="meta">${lib.type||'image'} · ${lib.scope||'global'} · ${count}项</div></div><div class="arrow">›</div></div>`;
    }).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('媒体库')}<div class="content"><div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px"><button class="btn-outline" onclick="App.addMediaLib('image','global')">+ 全局图片库</button><button class="btn-outline" onclick="App.addMediaLib('video','global')">+ 全局视频库</button><button class="btn-outline" onclick="App.addMediaLib('image','local')">+ 局部图片库</button><button class="btn-outline" onclick="App.addMediaLib('video','local')">+ 局部视频库</button></div>${listHtml}</div></div>`;
  },

  addMediaLib(type, scope) {
    const name = prompt('媒体库名称');
    if (!name) return;
    const libs = D.getMediaLibs();
    libs.push({ id: U.uid(), name, type, scope, items: [] });
    D.set('mediaLibraries', libs);
    this.renderPage();
  },

  editMediaLib(id) {
    this.editingMediaLib = id;
    this.nav('media-lib-edit');
  },

  pgMediaLibEdit() {
    const lib = D.getMediaLib(this.editingMediaLib);
    if (!lib) return `<div class="page">${this.navbar('编辑')}<div class="content"><p style="padding:20px">未找到媒体库</p></div></div>`;

    const itemsHtml = (lib.items || []).map((item, i) => `<div class="media-card"><img class="thumb" src="${U.esc(item.url)}" onerror="this.src='${U.avatarSvg('?')}'"><div class="info"><div class="name">${U.esc(item.desc || item.name || '未命名')}</div><div class="meta">${U.truncate(item.url||'',40)}</div></div><span style="color:var(--red);cursor:pointer;padding:8px" onclick="App.removeMediaItem('${lib.id}',${i})">✕</span></div>`).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('编辑媒体库', true, '<span onclick="App.saveMediaLib()" style="color:var(--green);font-size:15px">保存</span>')}<div class="content"><div class="form-group"><label>名称</label><input id="mlName" value="${U.esc(lib.name)}"></div><div class="form-group"><label>批量添加(每行: 链接 或 链接|描述)</label><textarea id="mlBatch" rows="3" placeholder="https://example.com/1.jpg|描述\nhttps://example.com/2.jpg"></textarea></div><button class="btn-primary" style="margin:8px 16px" onclick="App.addMediaLibItems('${lib.id}')">+ 批量添加</button><div class="form-group"><label>单独添加</label><div style="display:flex;gap:8px"><input id="mlSingleUrl" placeholder="链接" style="flex:1"><input id="mlSingleDesc" placeholder="描述" style="flex:1"></div></div><button class="btn-outline" style="margin:8px 16px" onclick="App.addSingleMediaItem('${lib.id}')">添加</button>${itemsHtml}<button class="btn-danger" style="margin:16px" onclick="App.deleteMediaLib('${lib.id}')">删除媒体库</button></div></div>`;
  },

  addMediaLibItems(id) {
    const text = document.getElementById('mlBatch')?.value;
    if (!text) return;
    const libs = D.getMediaLibs();
    const lib = libs.find(l => l.id === id);
    if (!lib) return;
    text.split('\n').filter(l => l.trim()).forEach(line => {
      const parts = line.split('|');
      lib.items.push({ url: parts[0].trim(), desc: (parts[1] || '').trim(), id: U.uid() });
    });
    D.set('mediaLibraries', libs);
    document.getElementById('mlBatch').value = '';
    this.renderPage();
  },

  addSingleMediaItem(id) {
    const url = document.getElementById('mlSingleUrl')?.value?.trim();
    const desc = document.getElementById('mlSingleDesc')?.value?.trim();
    if (!url) return;
    const libs = D.getMediaLibs();
    const lib = libs.find(l => l.id === id);
    if (!lib) return;
    lib.items.push({ url, desc: desc || '', id: U.uid() });
    D.set('mediaLibraries', libs);
    document.getElementById('mlSingleUrl').value = '';
    document.getElementById('mlSingleDesc').value = '';
    this.renderPage();
  },

  removeMediaItem(libId, idx) {
    const libs = D.getMediaLibs();
    const lib = libs.find(l => l.id === libId);
    if (lib) { lib.items.splice(idx, 1); D.set('mediaLibraries', libs); this.renderPage(); }
  },

  saveMediaLib() {
    const libs = D.getMediaLibs();
    const lib = libs.find(l => l.id === this.editingMediaLib);
    if (lib) {
      lib.name = document.getElementById('mlName')?.value?.trim() || lib.name;
      D.set('mediaLibraries', libs);
    }
    this.toast('已保存');
    this.goBack();
  },

  deleteMediaLib(id) {
    if (!confirm('确定删除？')) return;
    D.set('mediaLibraries', D.getMediaLibs().filter(l => l.id !== id));
    this.goBack();
  },

  // ===== OA LIST =====
  pgOAList() {
    const followed = D.get('followedOA') || [];
    const listHtml = followed.map(oa => `<div class="oa-item" onclick="App.openOA('${U.esc(oa.name)}')"><div class="oa-icon">${oa.emoji || '📰'}</div><div class="oa-info"><div class="name">${U.esc(oa.name)}</div><div class="desc">${U.esc(oa.desc || '')}</div></div></div>`).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('公众号')}<div class="content"><div class="search-bar" style="display:flex;gap:8px"><input id="oaSearch" placeholder="搜索公众号" style="flex:1"><button class="btn-outline" onclick="App.searchOA()">搜索</button></div>${listHtml}<div id="oaResults"></div></div></div>`;
  },

  async searchOA() {
    const q = document.getElementById('oaSearch')?.value?.trim();
    if (!q) return;
    this.toast('搜索中...');
    try {
      const results = await AI.searchOA(q);
      const followed = D.get('followedOA') || [];
      const followedNames = followed.map(o => o.name);
      const html = results.map(r => `<div class="oa-item"><div class="oa-icon">${r.emoji||'📰'}</div><div class="oa-info"><div class="name">${U.esc(r.name)}</div><div class="desc">${U.esc(r.desc||'')}</div></div>${followedNames.includes(r.name)?'<span style="color:var(--text3)">已关注</span>':`<button class="btn-outline" onclick="App.followOA(${JSON.stringify(r).replace(/"/g,'&quot;')})">+关注</button>`}</div>`).join('');
      document.getElementById('oaResults').innerHTML = html;
    } catch(e) { this.toast('搜索失败: ' + e.message); }
  },

  followOA(oa) {
    const followed = D.get('followedOA') || [];
    if (followed.find(o => o.name === oa.name)) { this.toast('已关注'); return; }
    followed.push({ ...oa, articles: [] });
    D.set('followedOA', followed);
    this.toast('已关注');
    this.renderPage();
  },

  openOA(name) {
    this.viewingOA = name;
    this.nav('oa-detail');
  },

  pgOADetail() {
    const followed = D.get('followedOA') || [];
    const oa = followed.find(o => o.name === this.viewingOA);
    if (!oa) return `<div class="page">${this.navbar('公众号')}<div class="content"><p style="padding:20px">未找到</p></div></div>`;

    const articlesHtml = (oa.articles || []).map((a, i) => `<div class="section-item" onclick="App.readArticle('${U.esc(this.viewingOA)}',${i})"><div class="left" style="flex-direction:column;align-items:flex-start"><div style="font-weight:600">${U.esc(a.title)}</div><div style="font-size:12px;color:var(--text3);margin-top:4px">${U.esc(a.summary||'')}</div></div></div>`).join('');

    return `<div class="page">${this.statusBar()}${this.navbar(oa.name, true, '<span onclick="App.pushArticles()" style="font-size:14px">推送</span>')}<div class="content">${articlesHtml || '<div style="text-align:center;padding:40px;color:var(--text3)">暂无文章，点击右上角推送</div>'}</div></div>`;
  },

  async pushArticles() {
    this.toast('AI生成文章中...');
    try {
      const articles = await AI.genArticles(this.viewingOA);
      const followed = D.get('followedOA');
      const oa = followed.find(o => o.name === this.viewingOA);
      if (oa) {
        if (!oa.articles) oa.articles = [];
        oa.articles.push(...articles.map(a => ({ ...a, ts: U.ts() })));
        D.set('followedOA', followed);
      }
      this.toast(`推送了 ${articles.length} 篇文章`);
      this.renderPage();
    } catch(e) { this.toast('推送失败: ' + e.message); }
  },

  readArticle(oaName, idx) {
    this.viewingArticle = { oaName, idx };
    this.nav('article');
  },

  pgArticle() {
    const { oaName, idx } = this.viewingArticle || {};
    const followed = D.get('followedOA') || [];
    const oa = followed.find(o => o.name === oaName);
    const article = oa?.articles?.[idx];
    if (!article) return `<div class="page">${this.navbar('文章')}<div class="content"><p style="padding:20px">文章不存在</p></div></div>`;

    return `<div class="page">${this.statusBar()}${this.navbar('文章')}<div class="content"><div class="article-view"><h1>${U.esc(article.title)}</h1><div class="meta">${U.esc(oaName)} · ${U.fmtTime(article.ts)}</div><div class="body">${U.nl2br(article.content||'')}</div></div></div></div>`;
  },

  // ===== SHOP =====
  pgShop() {
    const cart = D.get('shoppingCart') || [];
    const totalPrice = cart.reduce((s, c) => s + (c.price || 0), 0);
    
    return `<div class="page">${this.statusBar()}${this.navbar('购物')}<div class="content"><div class="search-bar" style="display:flex;gap:8px"><input id="shopSearch" placeholder="搜索商品" style="flex:1"><button class="btn-outline" onclick="App.searchShop()">搜索</button></div><div class="shop-grid" id="shopItems"><div style="grid-column:span 2;text-align:center;padding:40px;color:var(--text3)">搜索或点击搜索按钮浏览商品</div></div></div>${cart.length>0?`<div class="shop-bar"><span>🛒 (${cart.length}) ¥${totalPrice.toFixed(2)}</span><button class="btn-primary" style="width:auto;padding:8px 20px" onclick="App.checkout()">结算(${cart.length})</button></div>`:''}</div>`;
  },

  async searchShop() {
    const q = document.getElementById('shopSearch')?.value?.trim() || '';
    this.toast('搜索中...');
    try {
      const items = await AI.genShopItems(q);
      const html = items.map(item => `<div class="shop-item" onclick="App.addCart(${JSON.stringify(item).replace(/"/g,'&quot;')})"><div class="emoji">${item.emoji||'📦'}</div><div class="info"><div class="name">${U.esc(item.name)}</div><div class="price">¥${(item.price||0).toFixed(2)}</div></div></div>`).join('');
      document.getElementById('shopItems').innerHTML = html;
    } catch(e) { this.toast('搜索失败: ' + e.message); }
  },

  addCart(item) {
    const cart = D.get('shoppingCart') || [];
    cart.push(item);
    D.set('shoppingCart', cart);
    this.toast(`已加入购物车: ${item.name}`);
    this.renderPage();
  },

  checkout() {
    const cart = D.get('shoppingCart') || [];
    const total = cart.reduce((s, c) => s + (c.price || 0), 0);
    const balance = D.get('walletBalance') || 0;
    if (total > balance) { this.toast('余额不足'); return; }
    if (!confirm(`确认支付 ¥${total.toFixed(2)}？`)) return;
    D.set('walletBalance', balance - total);
    // Add to backpack
    cart.forEach(item => {
      D.addBackpack({ name: item.name, emoji: item.emoji || '📦', count: 1 });
    });
    D.set('shoppingCart', []);
    this.toast('购买成功！');
    this.renderPage();
  },

  // ===== FORUM =====
  pgForum() {
    const posts = D.get('forumCache') || [];
    const postsHtml = posts.map((p, i) => {
      const avatar = U.avatarSvg(p.author || '匿');
      return `<div class="forum-card" onclick="App.openForumPost(${i})"><div class="fc-header"><img src="${avatar}" style="width:32px;height:32px;border-radius:50%"><div><div style="font-weight:500">${U.esc(p.author||'匿名')}</div><div style="font-size:11px;color:var(--text3)">${U.fmtTime(p.ts)}</div></div></div><div class="fc-title">${U.esc(p.title||'')}</div><div class="fc-content">${U.esc(U.truncate(p.content||'',80))}</div><div class="fc-stats"><span>👍 ${p.likes||0}</span><span>💬 ${(p.replies||[]).length}</span></div></div>`;
    }).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('论坛', true, '<span onclick="App.refreshForum()">🔄</span>')}<div class="content"><div class="search-bar" style="display:flex;gap:8px"><input id="forumSearch" placeholder="搜索话题" style="flex:1"><button class="btn-outline" onclick="App.searchForum()">搜索</button></div>${postsHtml || '<div style="text-align:center;padding:40px;color:var(--text3)">暂无帖子，点击右上角刷新</div>'}</div></div>`;
  },

  async refreshForum() {
    this.toast('AI生成帖子...');
    try {
      const posts = await AI.genForumPosts('');
      const existing = D.get('forumCache') || [];
      const newPosts = posts.map(p => ({ ...p, ts: U.ts(), replies: p.replies || [] }));
      D.set('forumCache', [...newPosts, ...existing].slice(0, 50));
      this.renderPage();
    } catch(e) { this.toast('刷新失败: ' + e.message); }
  },

  async searchForum() {
    const q = document.getElementById('forumSearch')?.value?.trim();
    if (!q) return;
    this.toast('搜索中...');
    try {
      const posts = await AI.genForumPosts(q);
      D.set('forumCache', posts.map(p => ({ ...p, ts: U.ts(), replies: p.replies || [] })));
      this.renderPage();
    } catch(e) { this.toast('搜索失败: ' + e.message); }
  },

  openForumPost(idx) {
    this.viewingPost = idx;
    this.nav('forum-detail');
  },

  pgForumDetail() {
    const posts = D.get('forumCache') || [];
    const post = posts[this.viewingPost];
    if (!post) return `<div class="page">${this.navbar('帖子')}<div class="content"><p style="padding:20px">帖子不存在</p></div></div>`;

    const repliesHtml = (post.replies || []).map(r => {
      const avatar = U.avatarSvg(r.author || '匿');
      return `<div style="display:flex;gap:8px;padding:12px 0;border-bottom:1px solid var(--border)"><img src="${avatar}" style="width:28px;height:28px;border-radius:50%"><div><div style="font-weight:500;font-size:14px">${U.esc(r.author||'匿名')} <span style="font-size:11px;color:var(--text3)">${U.fmtTime(r.ts)}</span></div><div style="font-size:14px;margin-top:4px">${U.nl2br(r.content||'')}</div></div></div>`;
    }).join('');

    return `<div class="page">${this.statusBar()}${this.navbar('帖子', true, '<span onclick="App.replyForumPost()" style="font-size:14px">回复</span>')}<div class="content" style="padding:16px"><h2 style="font-size:20px;margin-bottom:8px">${U.esc(post.title||'')}</h2><div style="font-size:12px;color:var(--text3);margin-bottom:12px">${U.esc(post.author||'匿名')} · ${U.fmtTime(post.ts)} · 👍${post.likes||0}</div><div style="font-size:15px;line-height:1.7;margin-bottom:20px">${U.nl2br(post.content||'')}</div><div style="font-size:14px;font-weight:600;padding:8px 0;border-top:2px solid var(--border)">回复 (${(post.replies||[]).length})</div>${repliesHtml}</div></div>`;
  },

  replyForumPost() {
    const text = prompt('输入回复内容');
    if (!text) return;
    const posts = D.get('forumCache');
    const post = posts[this.viewingPost];
    if (!post.replies) post.replies = [];
    post.replies.push({ author: D.get('playerName'), content: text, ts: U.ts() });
    D.set('forumCache', posts);
    this.renderPage();
  },

  // ===== RP DETAIL =====
  pgRPDetail() {
    const msg = this.viewingRP;
    if (!msg) return `<div class="page">${this.navbar('红包详情')}<div class="content"><p style="padding:20px">红包不存在</p></div></div>`;

    return `<div class="page">${this.statusBar()}${this.navbar('红包详情')}<div class="content"><div class="rp-detail"><div class="rp-icon">🧧</div><div class="rp-from">${U.esc(msg.senderName||'')}</div><div class="rp-wish">${U.esc(msg.rpWish||'恭喜发财')}</div><div class="rp-amount">¥${(msg.rpAmount||0).toFixed(2)}</div>${msg.opened?`<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)"><span>${U.esc(msg.openedBy||'')} 已领取 ¥${(msg.rpAmount||0).toFixed(2)}</span></div>`:''}</div></div></div>`;
  },
  // ===== ADD FRIEND =====
  showAddMenu() {
    const html = `<div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-primary" onclick="App.showAddFriend();App.closeModal()">👤 添加好友</button>
      <button class="btn-primary" style="background:var(--blue)" onclick="App.showCreateGroup();App.closeModal()">👥 创建群聊</button>
    </div>`;
    this.modal('添加', html, () => {}, '', '关闭');
  },

  showAddFriend() {
    const html = `<div class="form-group"><label>好友昵称</label><input id="addFriendName" placeholder="输入昵称(AI将自动生成人设)"></div>`;
    this.modal('添加好友', html, async () => {
      const name = document.getElementById('addFriendName')?.value?.trim();
      if (!name) { App.toast('请输入昵称'); return; }
      App.toast('AI正在生成角色...');
      try {
        const info = await AI.generateFriendInfo(name);
        const friend = {
          id: U.uid(),
          name: info.name || name,
          avatar: info.avatar || '',
          persona: info.persona || '',
          signature: info.signature || '',
          style: info.style || ''
        };
        D.addFriend(friend);
        App.toast(`已添加好友: ${friend.name}`);
        App.renderPage();
      } catch(e) {
        // Fallback: add without AI
        D.addFriend({ id: U.uid(), name, avatar: '', persona: '', signature: '', style: '' });
        App.toast(`已添加好友: ${name}`);
        App.renderPage();
      }
    });
  },

  showGroupList() {
    const groups = D.getGroups();
    if (groups.length === 0) { this.toast('暂无群聊'); return; }
    const html = groups.map(g => `<div class="list-item" onclick="App.openChat('${g.id}',true);App.closeModal()"><img class="avatar" src="${U.avatarSvg(g.name)}"><div class="info"><div class="name">${U.esc(g.name)}</div><div class="msg">${(g.members||[]).length}人</div></div></div>`).join('');
    this.modal('群聊列表', html, () => {}, '', '关闭');
  },

  showCreateGroup() {
    const friends = D.getFriends();
    if (friends.length < 1) { this.toast('至少需要1个好友'); return; }
    const checksHtml = friends.map(f => `<label style="display:flex;align-items:center;gap:6px;padding:4px 0"><input type="checkbox" class="grpMember" value="${f.id}"> ${U.esc(f.name)}</label>`).join('');
    const html = `<div class="form-group"><label>群名称</label><input id="grpName" placeholder="群聊名称"></div><div class="form-group"><label>选择成员</label>${checksHtml}</div>`;
    this.modal('创建群聊', html, () => {
      const name = document.getElementById('grpName')?.value?.trim() || '新群聊';
      const members = [...document.querySelectorAll('.grpMember:checked')].map(el => el.value);
      if (members.length === 0) { App.toast('请选择成员'); return; }
      const group = { id: U.uid(), name, members };
      D.addGroup(group);
      App.toast(`已创建群聊: ${name}`);
      App.renderPage();
    });
  },

  // ===== AI MOMENTS GENERATION =====
  async genMoments() {
    this.toast('AI生成朋友圈...');
    try {
      const newMoments = await AI.genMoments(5);
      const moments = D.get('moments') || [];
      const friends = D.getFriends();
      
      for (const m of newMoments) {
        const friend = D.getFriendByName(m.authorName);
        moments.push({
          id: U.uid(),
          authorId: friend ? friend.id : '',
          authorName: m.authorName || '匿名',
          isPlayer: m.authorName === D.get('playerName'),
          text: m.text || '',
          images: m.images || [],
          location: m.location || '',
          likes: m.likes || [],
          comments: (m.comments || []).map(c => ({ name: c.name, text: c.text })),
          ts: U.ts() - Math.random() * 3600000 // Random time within last hour
        });
      }
      
      D.set('moments', moments);
      this.toast(`生成了 ${newMoments.length} 条朋友圈`);
      this.renderPage();
    } catch(e) { this.toast('生成失败: ' + e.message); }
  },

  async genDailyMoments() {
    this.toast('生成今日朋友圈...');
    try {
      const newMoments = await AI.genDailyMoments();
      const moments = D.get('moments') || [];
      
      for (const m of newMoments) {
        const friend = D.getFriendByName(m.authorName);
        moments.push({
          id: U.uid(),
          authorId: friend ? friend.id : (m.isPlayer ? 'player' : ''),
          authorName: m.authorName || '匿名',
          isPlayer: m.isPlayer || m.authorName === D.get('playerName'),
          text: m.text || '',
          images: m.images || [],
          location: m.location || '',
          likes: m.likes || [],
          comments: (m.comments || []).map(c => ({ name: c.name, text: c.text })),
          ts: U.ts() - Math.random() * 86400000
        });
      }
      
      // Sort by time
      moments.sort((a, b) => a.ts - b.ts);
      D.set('moments', moments);
      this.toast(`生成了 ${newMoments.length} 条朋友圈`);
      this.renderPage();
    } catch(e) { this.toast('生成失败: ' + e.message); }
  },

  // ===== MAIN AI BUTTON (for status bar) =====
  doAI() {
    const page = this.currentPage;
    if (page === 'chat') {
      this.doChatReply();
    } else if (page === 'moments') {
      this.genMoments();
    } else if (page === 'forum') {
      this.refreshForum();
    } else {
      this.toast('当前页面无AI功能');
    }
  }
};

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => App.init());

// Auto-save on close
window.addEventListener('beforeunload', () => D.forceSave());
</script>
</body>
</html>
